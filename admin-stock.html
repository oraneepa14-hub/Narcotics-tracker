(function() {
  var REQUIRED_ROLES = ["admin"];
  var session = null;
  try { session = JSON.parse(localStorage.getItem("narcoticsSession")); } catch (e) {}
  var now = new Date();
  if (!session || !session.token || !session.expiresAt || new Date(session.expiresAt) < now) {
    localStorage.removeItem("narcoticsSession");
    window.location.href = "index.html";
  } else if (REQUIRED_ROLES.indexOf(session.role) === -1) {
    window.location.href = "index.html";

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// URL ของ Apps Script Web App
const API_URL = "https://script.google.com/macros/s/AKfycbxpNAS-o0fcxYeCorsy6vRI6XkfFeWOEfBLRZ2VbMcHANn2ijkKWhNa92EwCp5aotv5jw/exec";

const STORAGE_POINTS = [
  { value: "main_warehouse", label: "คลังยาใหญ่" },
  { value: "sub_warehouse", label: "คลังยาย่อย" },
  { value: "er_cabinet", label: "ตู้ยาเสพติด ER นอกเวลา" }
];

const FIELD_DEFS = [
  { key: "itemCode", label: "รหัสยา (ItemCode)", required: true },
  { key: "itemName", label: "ชื่อยา (ItemName)", required: true },
  { key: "storagePoint", label: "จุดจัดเก็บ (StoragePoint)", required: false },
  { key: "currentQty", label: "จำนวนคงเหลือ (CurrentQty)", required: true },
  { key: "unit", label: "หน่วย (Unit)", required: false },
  { key: "maxRate", label: "Max rate", required: false },
  { key: "lot", label: "Lot", required: false },
  { key: "expiryDate", label: "วันหมดอายุ (Expire)", required: false },
  { key: "unitValue", label: "ราคาต่อหน่วย (UnitValue)", required: false },
  { key: "totalValue", label: "มูลค่ารวม (TotalValue)", required: false }
];

function guessColumn(fieldKey, headers) {
  const patterns = {
    itemCode: [/รหัส/, /code/i],
    itemName: [/ชื่อ/, /name/i],
    storagePoint: [/จุด/, /คลัง/, /point/i, /storage/i],
    currentQty: [/คงเหลือ/, /จำนวน/, /qty/i],
    unit: [/^หน่วย$/, /หน่วย/, /unit/i],
    maxRate: [/max\s*rate/i, /อัตราสูงสุด/],
    lot: [/lot/i, /ล็อต/],
    expiryDate: [/expire/i, /expiry/i, /หมดอายุ/],
    unitValue: [/ราคาต่อหน่วย/, /ราคา/, /price/i, /unit\s*value/i],
    totalValue: [/มูลค่ารวม/, /มูลค่า/, /total/i]
  };
  const list = patterns[fieldKey] || [];
  for (const pattern of list) {
    for (const h of headers) {
      if (pattern.test(h)) return h;
    }
  }
  return "";
}

/**
 * ช่องค้นหาชื่อยาจากฐานข้อมูลยา (DrugMaster) — เลือกแล้ว auto-fill รหัส/หน่วย/ราคา/ประเภทยา
 */
function DrugMasterPicker({ onSelect, listId }) {
  const [drugList, setDrugList] = useState(null);
  const [query, setQuery] = useState("");
  const [matched, setMatched] = useState(null);

  useEffect(() => {
    fetch(`${API_URL}?action=getDrugMaster&token=${(window.NARCOTICS_SESSION||{}).token}`)
      .then(res => res.json())
      .then(data => setDrugList(data.success ? data.data : []))
      .catch(() => setDrugList([]));
  }, []);

  const handleChange = (val) => {
    setQuery(val);
    const found = (drugList || []).find(d => d.itemName === val || d.itemCode === val);
    setMatched(found || null);
    if (found) onSelect(found);
  };

  return (
    <div style={{marginBottom: "12px"}}>
      <label>ค้นหาชื่อยา (จากฐานข้อมูลยา) — เลือกแล้วจะเติมรหัส/หน่วย/ราคาให้อัตโนมัติ</label>
      <input
        list={listId}
        value={query}
        onChange={e => handleChange(e.target.value)}
        placeholder={drugList === null ? "กำลังโหลดฐานข้อมูลยา..." : "พิมพ์ชื่อยาหรือรหัสยา..."}
      />
      <datalist id={listId}>
        {(drugList || []).map(d => <option key={d.itemCode} value={d.itemName} />)}
      </datalist>
      {matched && (
        <div className="sub" style={{marginTop: "4px"}}>
          รหัส: {matched.itemCode} · หน่วย: {matched.unit || "-"} · ราคา: {matched.unitValue}
        </div>
      )}
    </div>
  );
}

function UploadPanel({ uploaderName }) {
  const [rawRows, setRawRows] = useState(null); // array of objects, keyed by original header
  const [headers, setHeaders] = useState([]);
  const [mapping, setMapping] = useState({});
  const [defaultStoragePoint, setDefaultStoragePoint] = useState("sub_warehouse");
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);
  const [fileName, setFileName] = useState("");

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setFileName(file.name);
    setStatus(null);
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "array" });
        const sheetName = wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const json = XLSX.utils.sheet_to_json(ws, { defval: "" });
        if (json.length === 0) {
          setStatus({ ok: false, msg: "ไม่พบข้อมูลในไฟล์ (ชีตแรกว่างเปล่า)" });
          return;
        }
        const hdrs = Object.keys(json[0]);
        setHeaders(hdrs);
        setRawRows(json);
        const autoMap = {};
        FIELD_DEFS.forEach(f => { autoMap[f.key] = guessColumn(f.key, hdrs); });
        setMapping(autoMap);
      } catch (err) {
        setStatus({ ok: false, msg: "อ่านไฟล์ไม่สำเร็จ: " + err.message });
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const updateMapping = (fieldKey, column) => {
    setMapping(prev => ({ ...prev, [fieldKey]: column }));
  };

  const buildPreviewItems = () => {
    if (!rawRows) return [];
    return rawRows.map(row => {
      const item = {};
      FIELD_DEFS.forEach(f => {
        const col = mapping[f.key];
        item[f.key] = col ? row[col] : "";
      });
      if (!item.storagePoint) item.storagePoint = defaultStoragePoint;
      return item;
    });
  };

  const missingRequired = FIELD_DEFS.filter(f => f.required && !mapping[f.key]);

  const confirmUpload = async () => {
    setLoading(true);
    setStatus(null);
    try {
      const items = buildPreviewItems()
        .filter(it => it.itemCode) // ข้ามแถวว่าง
        .map(it => ({ ...it, updatedBy: uploaderName || "" }));

      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ token: (window.NARCOTICS_SESSION||{}).token,  action: "bulkUpsertStockLedger", items })
      });
      const data = await res.json();
      if (data.success) {
        setStatus({ ok: true, msg: `บันทึกสำเร็จ: เพิ่มใหม่ ${data.inserted} รายการ, อัปเดต ${data.updated} รายการ` +
          (data.errors && data.errors.length ? ` (ข้อผิดพลาด ${data.errors.length} รายการ)` : "") });
      } else {
        setStatus({ ok: false, msg: data.error || "บันทึกไม่สำเร็จ" });
      }
    } catch (err) {
      setStatus({ ok: false, msg: "เชื่อมต่อระบบไม่สำเร็จ: " + err.message });
    }
    setLoading(false);
  };

  const preview = buildPreviewItems();

  return (
    <div>
      <label>เลือกไฟล์ Excel (.xlsx)</label>
      <input type="file" accept=".xlsx,.xls" onChange={handleFile} />
      {fileName && <div className="sub">ไฟล์: {fileName} ({rawRows ? rawRows.length : 0} แถว)</div>}

      {headers.length > 0 && (
        <div style={{marginTop: "16px"}}>
          <h2>จับคู่คอลัมน์</h2>
          <div className="sub">ระบบเดาให้อัตโนมัติ ตรวจสอบและแก้ไขได้ก่อนนำเข้า</div>

          {FIELD_DEFS.map(f => (
            <div className="map-row" key={f.key}>
              <label>{f.label} {f.required && <span style={{color:"#dc2626"}}>*</span>}</label>
              <select value={mapping[f.key] || ""} onChange={e => updateMapping(f.key, e.target.value)}>
                <option value="">-- ไม่ใช้ --</option>
                {headers.map(h => <option key={h} value={h}>{h}</option>)}
              </select>
            </div>
          ))}

          <label>จุดจัดเก็บเริ่มต้น (ใช้เมื่อไม่ได้จับคู่คอลัมน์ StoragePoint)</label>
          <select value={defaultStoragePoint} onChange={e => setDefaultStoragePoint(e.target.value)}>
            {STORAGE_POINTS.map(p => <option key={p.value} value={p.value}>{p.label}</option>)}
          </select>

          {missingRequired.length > 0 && (
            <div className="status err">ต้องจับคู่คอลัมน์ที่จำเป็นก่อน: {missingRequired.map(f => f.label).join(", ")}</div>
          )}

          <h2 style={{marginTop:"16px"}}>ตัวอย่างข้อมูลก่อนนำเข้า ({preview.length} รายการ)</h2>
          <div className="scroll-table">
            <table>
              <thead>
                <tr>{FIELD_DEFS.map(f => <th key={f.key}>{f.label}</th>)}</tr>
              </thead>
              <tbody>
                {preview.slice(0, 20).map((it, i) => (
                  <tr key={i}>
                    {FIELD_DEFS.map(f => <td key={f.key}>{String(it[f.key])}</td>)}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {preview.length > 20 && <div className="sub">แสดง 20 แถวแรกจากทั้งหมด {preview.length} แถว</div>}

          <button
            style={{marginTop: "16px"}}
            disabled={loading || missingRequired.length > 0 || preview.length === 0}
            onClick={confirmUpload}
          >
            {loading ? "กำลังนำเข้า..." : `ยืนยันนำเข้า ${preview.length} รายการ`}
          </button>
        </div>
      )}

      {status && <div className={`status ${status.ok ? "ok" : "err"}`}>{status.msg}</div>}
    </div>
  );
}

function ManualPanel({ uploaderName }) {
  const [item, setItem] = useState({
    itemCode: "", itemName: "", storagePoint: "sub_warehouse", currentQty: "",
    unit: "", maxRate: "", lot: "", expiryDate: "", unitValue: "", totalValue: ""
  });
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);

  const update = (key, value) => setItem(prev => ({ ...prev, [key]: value }));

  const save = async () => {
    if (!item.itemCode || !item.itemName || item.currentQty === "") {
      setStatus({ ok: false, msg: "กรุณากรอกรหัสยา ชื่อยา และจำนวนคงเหลือให้ครบ" });
      return;
    }
    setLoading(true);
    setStatus(null);
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ token: (window.NARCOTICS_SESSION||{}).token,  action: "upsertStockItem", item: { ...item, updatedBy: uploaderName || "" } })
      });
      const data = await res.json();
      if (data.success) {
        setStatus({ ok: true, msg: "บันทึกรายการเรียบร้อย" });
        setItem({ itemCode: "", itemName: "", storagePoint: item.storagePoint, currentQty: "",
          unit: "", maxRate: "", lot: "", expiryDate: "", unitValue: "", totalValue: "" });
      } else {
        setStatus({ ok: false, msg: data.error || "บันทึกไม่สำเร็จ" });
      }
    } catch (err) {
      setStatus({ ok: false, msg: "เชื่อมต่อระบบไม่สำเร็จ: " + err.message });
    }
    setLoading(false);
  };

  return (
    <div>
      <div className="sub">เพิ่มหรือแก้ไขรายการยาทีละรายการ — ถ้ารหัสยา + จุดจัดเก็บตรงกับรายการเดิม จะเป็นการอัปเดตจำนวนแทนการเพิ่มใหม่</div>

      <DrugMasterPicker listId="drugListStockManual" onSelect={(d) => {
        update("itemCode", d.itemCode);
        update("itemName", d.itemName);
        update("unit", d.unit || "");
        update("unitValue", d.unitValue !== "" && d.unitValue !== undefined ? String(d.unitValue) : "");
      }} />

      <label>รหัสยา (ItemCode) *</label>
      <input value={item.itemCode} onChange={e => update("itemCode", e.target.value)} />

      <label>ชื่อยา (ItemName) *</label>
      <input value={item.itemName} onChange={e => update("itemName", e.target.value)} />

      <label>จุดจัดเก็บ</label>
      <select value={item.storagePoint} onChange={e => update("storagePoint", e.target.value)}>
        {STORAGE_POINTS.map(p => <option key={p.value} value={p.value}>{p.label}</option>)}
      </select>

      <label>จำนวนคงเหลือ (CurrentQty) *</label>
      <input type="number" value={item.currentQty} onChange={e => update("currentQty", e.target.value)} />

      <label>หน่วย (Unit)</label>
      <input value={item.unit} onChange={e => update("unit", e.target.value)} />

      <label>Max rate</label>
      <input value={item.maxRate} onChange={e => update("maxRate", e.target.value)} />

      <label>Lot</label>
      <input value={item.lot} onChange={e => update("lot", e.target.value)} />

      <label>วันหมดอายุ (Expire)</label>
      <input value={item.expiryDate} onChange={e => update("expiryDate", e.target.value)} placeholder="เช่น 2027-01-31" />

      <label>ราคาต่อหน่วย (UnitValue)</label>
      <input type="number" value={item.unitValue} onChange={e => update("unitValue", e.target.value)} />

      <label>มูลค่ารวม (TotalValue, เว้นว่างให้คำนวณอัตโนมัติ)</label>
      <input type="number" value={item.totalValue} onChange={e => update("totalValue", e.target.value)} />

      <button style={{marginTop: "16px"}} disabled={loading} onClick={save}>
        {loading ? "กำลังบันทึก..." : "บันทึกรายการนี้"}
      </button>

      {status && <div className={`status ${status.ok ? "ok" : "err"}`}>{status.msg}</div>}
    </div>
  );
}

/* ---------------- ฐานข้อมูลยา (Drug Master) ---------------- */
const DRUG_TYPE_OPTIONS = [
  { value: "narcotic_2", label: "1) ยาเสพติดประเภท 2" },
  { value: "psychotropic_2", label: "2) วัตถุออกฤทธิ์ต่อจิตประสาทประเภท 2" }
];
const drugTypeLabel = (v) => (DRUG_TYPE_OPTIONS.find(o => o.value === v) || {}).label || v || "-";

function guessDrugTypeValue(raw) {
  const s = String(raw || "");
  if (/เสพติด/.test(s) || /narcotic/i.test(s)) return "narcotic_2";
  if (/ออกฤทธิ์|จิตประสาท|psychotropic/i.test(s)) return "psychotropic_2";
  return "";
}

const DRUG_FIELD_DEFS = [
  { key: "itemCode", label: "รหัสยา (ItemCode)", required: true },
  { key: "itemName", label: "ชื่อยา (ItemName)", required: true },
  { key: "drugType", label: "ประเภทยา (DrugType)", required: false },
  { key: "unit", label: "หน่วย (Unit)", required: false },
  { key: "unitValue", label: "ราคาต่อหน่วย (UnitValue)", required: false }
];

function guessDrugColumn(fieldKey, headers) {
  const patterns = {
    itemCode: [/รหัส/, /code/i],
    itemName: [/ชื่อ/, /name/i],
    drugType: [/ประเภท/, /type/i],
    unit: [/^หน่วย$/, /หน่วย/, /unit/i],
    unitValue: [/ราคา/, /price/i, /value/i]
  };
  const list = patterns[fieldKey] || [];
  for (const pattern of list) {
    for (const h of headers) {
      if (pattern.test(h)) return h;
    }
  }
  return "";
}

function DrugMasterUploadPanel({ uploaderName }) {
  const [rawRows, setRawRows] = useState(null);
  const [headers, setHeaders] = useState([]);
  const [mapping, setMapping] = useState({});
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);
  const [fileName, setFileName] = useState("");

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setFileName(file.name);
    setStatus(null);
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, { defval: "" });
        if (json.length === 0) {
          setStatus({ ok: false, msg: "ไม่พบข้อมูลในไฟล์" });
          return;
        }
        const hdrs = Object.keys(json[0]);
        setHeaders(hdrs);
        setRawRows(json);
        const autoMap = {};
        DRUG_FIELD_DEFS.forEach(f => { autoMap[f.key] = guessDrugColumn(f.key, hdrs); });
        setMapping(autoMap);
      } catch (err) {
        setStatus({ ok: false, msg: "อ่านไฟล์ไม่สำเร็จ: " + err.message });
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const updateMapping = (fieldKey, column) => setMapping(prev => ({ ...prev, [fieldKey]: column }));

  const buildPreviewItems = () => {
    if (!rawRows) return [];
    return rawRows.map(row => {
      const item = {};
      DRUG_FIELD_DEFS.forEach(f => {
        const col = mapping[f.key];
        item[f.key] = col ? row[col] : "";
      });
      if (item.drugType) item.drugType = guessDrugTypeValue(item.drugType) || item.drugType;
      return item;
    });
  };

  const missingRequired = DRUG_FIELD_DEFS.filter(f => f.required && !mapping[f.key]);
  const preview = buildPreviewItems();

  const confirmUpload = async () => {
    setLoading(true);
    setStatus(null);
    try {
      const items = preview.filter(it => it.itemCode);
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ token: (window.NARCOTICS_SESSION||{}).token,  action: "bulkUpsertDrugMaster", items })
      });
      const data = await res.json();
      if (data.success) {
        setStatus({ ok: true, msg: `บันทึกสำเร็จ: เพิ่มใหม่ ${data.inserted} รายการ, อัปเดต ${data.updated} รายการ` });
      } else {
        setStatus({ ok: false, msg: data.error || "บันทึกไม่สำเร็จ" });
      }
    } catch (err) {
      setStatus({ ok: false, msg: "เชื่อมต่อระบบไม่สำเร็จ: " + err.message });
    }
    setLoading(false);
  };

  return (
    <div>
      <label>เลือกไฟล์ Excel (.xlsx)</label>
      <input type="file" accept=".xlsx,.xls" onChange={handleFile} />
      {fileName && <div className="sub">ไฟล์: {fileName} ({rawRows ? rawRows.length : 0} แถว)</div>}

      {headers.length > 0 && (
        <div style={{marginTop: "16px"}}>
          <h2>จับคู่คอลัมน์</h2>
          {DRUG_FIELD_DEFS.map(f => (
            <div className="map-row" key={f.key}>
              <label>{f.label} {f.required && <span style={{color:"#dc2626"}}>*</span>}</label>
              <select value={mapping[f.key] || ""} onChange={e => updateMapping(f.key, e.target.value)}>
                <option value="">-- ไม่ใช้ --</option>
                {headers.map(h => <option key={h} value={h}>{h}</option>)}
              </select>
            </div>
          ))}
          {missingRequired.length > 0 && (
            <div className="status err">ต้องจับคู่คอลัมน์ที่จำเป็นก่อน: {missingRequired.map(f => f.label).join(", ")}</div>
          )}

          <h2 style={{marginTop:"16px"}}>ตัวอย่างข้อมูล ({preview.length} รายการ)</h2>
          <div className="scroll-table">
            <table>
              <thead><tr>{DRUG_FIELD_DEFS.map(f => <th key={f.key}>{f.label}</th>)}</tr></thead>
              <tbody>
                {preview.slice(0, 20).map((it, i) => (
                  <tr key={i}>
                    {DRUG_FIELD_DEFS.map(f => (
                      <td key={f.key}>{f.key === "drugType" ? drugTypeLabel(it[f.key]) : String(it[f.key])}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <button
            style={{marginTop: "16px"}}
            disabled={loading || missingRequired.length > 0 || preview.length === 0}
            onClick={confirmUpload}
          >
            {loading ? "กำลังนำเข้า..." : `ยืนยันนำเข้า ${preview.length} รายการ`}
          </button>
        </div>
      )}
      {status && <div className={`status ${status.ok ? "ok" : "err"}`}>{status.msg}</div>}
    </div>
  );
}

function DrugMasterManualPanel({ uploaderName }) {
  const [item, setItem] = useState({ itemCode: "", itemName: "", drugType: "narcotic_2", unit: "", unitValue: "" });
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);

  const update = (k, v) => setItem(prev => ({ ...prev, [k]: v }));

  const save = async () => {
    if (!item.itemCode || !item.itemName) {
      setStatus({ ok: false, msg: "กรุณากรอกรหัสยาและชื่อยาให้ครบ" });
      return;
    }
    setLoading(true);
    setStatus(null);
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ token: (window.NARCOTICS_SESSION||{}).token,  action: "upsertDrugMasterItem", item })
      });
      const data = await res.json();
      if (data.success) {
        setStatus({ ok: true, msg: "บันทึกรายการเรียบร้อย" });
        setItem({ itemCode: "", itemName: "", drugType: item.drugType, unit: "", unitValue: "" });
      } else {
        setStatus({ ok: false, msg: data.error });
      }
    } catch (err) {
      setStatus({ ok: false, msg: "เชื่อมต่อระบบไม่สำเร็จ: " + err.message });
    }
    setLoading(false);
  };

  return (
    <div>
      <div className="sub">เพิ่ม/แก้ไขรายการในฐานข้อมูลยาทีละรายการ — ถ้ารหัสยาตรงกับรายการเดิม จะเป็นการอัปเดตทับ</div>
      <label>รหัสยา (ItemCode) *</label>
      <input value={item.itemCode} onChange={e => update("itemCode", e.target.value)} />
      <label>ชื่อยา (ItemName) *</label>
      <input value={item.itemName} onChange={e => update("itemName", e.target.value)} />
      <label>ประเภทยา</label>
      <select value={item.drugType} onChange={e => update("drugType", e.target.value)}>
        {DRUG_TYPE_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
      <label>หน่วย</label>
      <input value={item.unit} onChange={e => update("unit", e.target.value)} />
      <label>ราคาต่อหน่วย</label>
      <input type="number" value={item.unitValue} onChange={e => update("unitValue", e.target.value)} />
      <button style={{marginTop: "16px"}} disabled={loading} onClick={save}>
        {loading ? "กำลังบันทึก..." : "บันทึกรายการนี้"}
      </button>
      {status && <div className={`status ${status.ok ? "ok" : "err"}`}>{status.msg}</div>}
    </div>
  );
}

function DrugMasterPanel({ uploaderName }) {
  const [subTab, setSubTab] = useState("upload");
  return (
    <div>
      <div className="sub" style={{marginBottom: "12px"}}>
        ฐานข้อมูลยาเสพติดประเภท 2 / วัตถุออกฤทธิ์ต่อจิตประสาทประเภท 2 — ใช้เป็นข้อมูลนำทางตอนเลือกชื่อยาในฟอร์มต่างๆ
        (จะ auto-fill รหัส, หน่วย, ราคา, ประเภทยา ให้อัตโนมัติ)
      </div>
      <div className="tab-bar">
        <button className={subTab === "upload" ? "active" : ""} onClick={() => setSubTab("upload")}>อัปโหลดจาก Excel</button>
        <button className={subTab === "manual" ? "active" : ""} onClick={() => setSubTab("manual")}>กรอกเอง (Manual)</button>
      </div>
      {subTab === "upload" ? <DrugMasterUploadPanel uploaderName={uploaderName} /> : <DrugMasterManualPanel uploaderName={uploaderName} />}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("upload");
  const session = window.NARCOTICS_SESSION || {};
  const uploaderName = session.displayName;

  return (
    <div className="app">
      <div className="card">
        <h1>จัดการรายการยา (StockLedger)</h1>
        <div className="sub">อัปโหลดข้อมูลจากไฟล์ Excel หรือกรอกเพิ่ม/แก้ไขทีละรายการ</div>
        <div className="sub" style={{marginTop: "-8px"}}>
          ผู้บันทึก: <b style={{color: "#0e7c86"}}>{session.displayName}</b> ({session.username}) — ใช้บัญชีที่เข้าสู่ระบบเป็นผู้บันทึกโดยอัตโนมัติ
        </div>
      </div>

      <div className="card">
        <div className="tab-bar">
          <button className={tab === "upload" ? "active" : ""} onClick={() => setTab("upload")}>อัปโหลดจาก Excel (StockLedger)</button>
          <button className={tab === "manual" ? "active" : ""} onClick={() => setTab("manual")}>กรอกเอง (StockLedger)</button>
          <button className={tab === "drugmaster" ? "active" : ""} onClick={() => setTab("drugmaster")}>ฐานข้อมูลยา (Drug Master)</button>
        </div>
        {tab === "upload" && <UploadPanel uploaderName={uploaderName} />}
        {tab === "manual" && <ManualPanel uploaderName={uploaderName} />}
        {tab === "drugmaster" && <DrugMasterPanel uploaderName={uploaderName} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
