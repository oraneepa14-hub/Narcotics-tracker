<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ระบบยืนยันจำนวนยาเสพติด/วัตถุออกฤทธิ์ต่อจิตประสาท - คลังยาย่อย</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { font-family: 'Sarabun', 'Noto Sans Thai', sans-serif; background: #f4f0fa; margin: 0; }
  .app { max-width: 620px; margin: 0 auto; padding: 24px 16px; }
  .card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 2px 10px rgba(107,70,193,0.12); margin-bottom: 16px; }
  h1 { font-size: 1.25rem; color: #5b21b6; margin-bottom: 4px; }
  .sub { color: #777; font-size: 0.9rem; margin-bottom: 16px; }
  label { display: block; font-size: 0.9rem; color: #444; margin: 10px 0 4px; }
  select, input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; font-family: inherit; }
  button { width: 100%; padding: 12px; background: #7c3aed; color: #fff; border: none; border-radius: 10px; font-size: 1rem; margin-top: 16px; cursor: pointer; }
  button:disabled { background: #ccc; }
  .status { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 0.9rem; }
  .ok { background: #dcfce7; color: #166534; }
  .err { background: #fee2e2; color: #991b1b; }
  .loading { text-align: center; color: #888; padding: 20px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th, td { padding: 8px 6px; border-bottom: 1px solid #eee; text-align: left; vertical-align: middle; }
  th { color: #666; font-weight: 600; font-size: 0.8rem; }
  td.qty-col, th.qty-col { width: 90px; }
  td input[type=number] { padding: 6px; text-align: center; }
  td input[type=text] { padding: 6px; }
  .item-name { font-weight: 500; }
  .system-qty { color: #888; font-size: 0.85rem; }
  .mismatch { background: #fff7ed; }
  .mismatch input[type=number] { border-color: #f97316; }
  .badge-diff { display: inline-block; margin-top: 2px; font-size: 0.75rem; color: #c2410c; }
</style>
<script>
(function() {
  var REQUIRED_ROLES = ["staff", "admin"];
  var session = null;
  try { session = JSON.parse(localStorage.getItem("narcoticsSession")); } catch (e) {}
  var now = new Date();
  if (!session || !session.token || !session.expiresAt || new Date(session.expiresAt) < now) {
    localStorage.removeItem("narcoticsSession");
    window.location.href = "index.html";
  } else if (REQUIRED_ROLES.indexOf(session.role) === -1) {
    window.location.href = "index.html";
  } else {
    window.NARCOTICS_SESSION = session;
  }
})();
</script>
</head>
<body>
<div id="narcoticsTopbar" style="display:flex;align-items:center;justify-content:flex-end;gap:12px;background:#ffffffcc;backdrop-filter:blur(6px);padding:8px 20px;font-family:'Sarabun','Noto Sans Thai',sans-serif;font-size:0.85rem;color:#555;border-bottom:1px solid #eee;">
  <a href="index.html" style="color:#7c3aed;text-decoration:none;font-weight:600;margin-right:auto;">&larr; กลับหน้าหลัก</a>
  <span>เข้าสู่ระบบในนาม <b id="narcoticsUserName" style="color:#5b21b6;"></b></span>
  <span id="narcoticsUserRole" style="background:#ede9fe;color:#5b21b6;padding:2px 10px;border-radius:999px;font-size:0.78rem;"></span>
  <button onclick="narcoticsLogout()" style="background:#fee2e2;color:#991b1b;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:0.8rem;">ออกจากระบบ</button>
</div>
<script>
  (function() {
    var s = window.NARCOTICS_SESSION;
    if (!s) return;
    document.getElementById("narcoticsUserName").textContent = s.displayName || s.username;
    document.getElementById("narcoticsUserRole").textContent = s.role === "admin" ? "ผู้ดูแลระบบ" : "ผู้ปฏิบัติงาน";
  })();
  function narcoticsLogout() {
    var s = window.NARCOTICS_SESSION;
    localStorage.removeItem("narcoticsSession");
    if (s && s.token && typeof API_URL !== "undefined") {
      fetch(API_URL, { method: "POST", body: JSON.stringify({ token: (window.NARCOTICS_SESSION||{}).token,  action: "logout", token: s.token }) }).catch(function(){});
    }
    window.location.href = "index.html";
  }
</script>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// URL ของ Apps Script Web App
const API_URL = "https://script.google.com/macros/s/AKfycbxpNAS-o0fcxYeCorsy6vRI6XkfFeWOEfBLRZ2VbMcHANn2ijkKWhNa92EwCp5aotv5jw/exec";
const STORAGE_POINT = "sub_warehouse"; // เช็คเฉพาะคลังยาย่อยเท่านั้น ไม่ต้องเลือก

function App() {
  const session = window.NARCOTICS_SESSION || {};
  const [notes, setNotes] = useState("");
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);
  const [items, setItems] = useState(null); // null = กำลังโหลด
  const [counts, setCounts] = useState({});   // itemCode -> countedQty (string)
  const [itemNotes, setItemNotes] = useState({}); // itemCode -> note (string)

  useEffect(() => {
    fetch(`${API_URL}?action=getSubWarehouseStock&token=${(window.NARCOTICS_SESSION||{}).token}`)
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          setItems(data.data);
          const initCounts = {};
          data.data.forEach(it => { initCounts[it.itemCode] = String(it.systemQty); });
          setCounts(initCounts);
        } else {
          setStatus({ ok: false, msg: data.error || "โหลดรายการยาไม่สำเร็จ" });
          setItems([]);
        }
      })
      .catch(err => {
        setStatus({ ok: false, msg: "เชื่อมต่อระบบไม่สำเร็จ: " + err.message });
        setItems([]);
      });
  }, []);

  const updateCount = (itemCode, value) => {
    setCounts(prev => ({ ...prev, [itemCode]: value }));
  };

  const updateItemNote = (itemCode, value) => {
    setItemNotes(prev => ({ ...prev, [itemCode]: value }));
  };

  const submit = async () => {
    setLoading(true);
    setStatus(null);
    try {
      const confirmedCounts = (items || []).map(it => ({
        itemCode: it.itemCode,
        itemName: it.itemName,
        systemQty: it.systemQty,
        countedQty: counts[it.itemCode],
        note: itemNotes[it.itemCode] || ""
      }));

      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ token: (window.NARCOTICS_SESSION||{}).token, 
          action: "submitShiftCheckin",
          staffName: session.displayName,
          staffUsername: session.username,
          storagePoint: STORAGE_POINT,
          confirmedCounts,
          notes
        })
      });
      const data = await res.json();
      if (data.success) {
        setStatus({ ok: true, msg: `ยืนยันสำเร็จ (เวร: ${data.shiftType === 'morning' ? 'เช้า' : 'บ่าย/ดึก'})` });
      } else {
        setStatus({ ok: false, msg: data.error || "เกิดข้อผิดพลาด" });
      }
    } catch (err) {
      setStatus({ ok: false, msg: "เชื่อมต่อระบบไม่สำเร็จ: " + err.message });
    }
    setLoading(false);
  };

  return (
    <div className="app">
      <div className="card">
        <h1>ยืนยันจำนวนคงเหลือยาเสพติด/วัตถุออกฤทธิ์ — คลังยาย่อย</h1>
        <div className="sub">การกดยืนยันถือเป็นการลงลายมือชื่อผู้ปฏิบัติงานเวรนี้ โดยใช้บัญชีที่เข้าสู่ระบบเป็นผู้ยืนยัน</div>
        <div className="sub" style={{marginTop: "-8px"}}>
          ผู้ปฏิบัติงานเวรนี้: <b style={{color: "#5b21b6"}}>{session.displayName}</b> ({session.username})
        </div>
      </div>

      <div className="card">
        <h1 style={{fontSize: "1.05rem"}}>รายการยาเสพติดประเภท 2 / วัตถุออกฤทธิ์ประเภท 2 (คลังยาย่อย)</h1>
        <div className="sub">ตรวจนับจริงแล้วปรับจำนวนในช่องได้ถ้าไม่ตรงกับจำนวนในระบบ พร้อมระบุหมายเหตุ</div>

        {items === null && <div className="loading">กำลังโหลดรายการยา...</div>}
        {items && items.length === 0 && <div className="loading">ไม่พบรายการยาในคลังยาย่อย</div>}

        {items && items.length > 0 && (
          <table>
            <thead>
              <tr>
                <th>ชื่อยา</th>
                <th className="qty-col">จำนวนคงเหลือ<br/>(ตามระบบคลังย่อย)</th>
                <th>หน่วย</th>
                <th>Max rate</th>
                <th className="qty-col">จำนวนที่ปรากฏ</th>
                <th>หมายเหตุ</th>
              </tr>
            </thead>
            <tbody>
              {items.map(it => {
                const counted = counts[it.itemCode] ?? "";
                const isMismatch = String(counted) !== String(it.systemQty);
                return (
                  <tr key={it.itemCode} className={isMismatch ? "mismatch" : ""}>
                    <td>
                      <div className="item-name">{it.itemName}</div>
                      {isMismatch && <div className="badge-diff">⚠ ไม่ตรงกับระบบ</div>}
                    </td>
                    <td className="qty-col">{it.systemQty}</td>
                    <td>{it.unit}</td>
                    <td>{it.maxRate}</td>
                    <td className="qty-col">
                      <input
                        type="number"
                        value={counted}
                        onChange={e => updateCount(it.itemCode, e.target.value)}
                      />
                    </td>
                    <td>
                      <input
                        type="text"
                        placeholder="ถ้ามี"
                        value={itemNotes[it.itemCode] || ""}
                        onChange={e => updateItemNote(it.itemCode, e.target.value)}
                      />
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      <div className="card">
        <label>หมายเหตุรวมของเวรนี้ (ถ้ามี)</label>
        <textarea rows="3" value={notes} onChange={e => setNotes(e.target.value)} />

        <button onClick={submit} disabled={loading || items === null}>
          {loading ? "กำลังบันทึก..." : "ยืนยันจำนวนคงเหลือ"}
        </button>

        {status && (
          <div className={`status ${status.ok ? "ok" : "err"}`}>{status.msg}</div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
