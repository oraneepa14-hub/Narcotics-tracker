<style>

  :root {
    --navy-900: #0b2440;
    --navy-800: #123a63;
    --navy-700: #1a4a7a;
    --teal-600: #0e7c86;

    case "chevron":
      return (<svg {...common}><path d="M9 5l7 7-7 7" /></svg>);
    case "user":
      return (<svg {...common}><circle cx="12" cy="8" r="3.5" /><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6" /></svg>);
    case "eye":
      return (<svg {...common}><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" /><circle cx="12" cy="12" r="3" /></svg>);
    case "eye-off":
      return (<svg {...common}><path d="M3 3l18 18" /><path d="M10.6 5.1A9.8 9.8 0 0 1 12 5c6.5 0 10 7 10 7a17.6 17.6 0 0 1-3.4 4.3M6.5 6.6C3.6 8.4 2 12 2 12s3.5 7 10 7c1.4 0 2.6-.3 3.7-.8" /><path d="M9.5 9.6a3 3 0 0 0 4.2 4.2" /></svg>);

      return (<svg {...common}><path d="M9 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h3" /><path d="M15 16l4-4-4-4" /><path d="M19 12H9" /></svg>);
    default:
      return null;

};

function loadSession() {
  try {
    const s = JSON.parse(localStorage.getItem("narcoticsSession"));
    if (s && s.token && s.expiresAt && new Date(s.expiresAt) > new Date()) return s;
  } catch (e) {}
  return null;
}

function OfficialBand() {
  return (
    <div className="official-band">
      <div className="brand-group">
        <div className="crest"><img src="logo.png" alt="ตราสัญลักษณ์ระบบ" /></div>
        <div>
          <h1>ระบบติดตามยาเสพติด/วัตถุออกฤทธิ์ต่อจิตประสาท</h1>
          <p>กลุ่มงานเภสัชกรรม โรงพยาบาลเขวาสินรินทร์ · กระทรวงสาธารณสุข</p>
        </div>
      </div>
      <div className="gov-tag">ระบบภายในหน่วยงาน</div>

function LoginView({ onLoggedIn }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [showPassword, setShowPassword] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const submit = async (e) => {
    e.preventDefault();
    if (!username || !password) {
      setError("กรุณากรอก Username และรหัสผ่านให้ครบ");
      return;
    }
    setLoading(true);
    setError(null);
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "login", username, password })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem("narcoticsSession", JSON.stringify(data));
        onLoggedIn(data);
      } else {
        setError(data.error || "เข้าสู่ระบบไม่สำเร็จ");
      }
    } catch (err) {
      setError("เชื่อมต่อระบบไม่สำเร็จ: " + err.message);
    }
    setLoading(false);
  };

  const FEATURES = [
    { icon: "clipboard-check", title: "ยืนยันจำนวนคงเหลือ", desc: "ตรวจนับรายเวร" },
    { icon: "capsule", title: "เบิกยาผู้ป่วย", desc: "รายบุคคล + ติดตามใบ" },
    { icon: "chart", title: "รายงาน Skynet", desc: "สรุปรายเดือน" },
    { icon: "paperclip", title: "เอกสาร/ลิงก์", desc: "เข้าถึงได้ทุกคน" }
  ];

  return (
    <div className="split-login">
      <div className="split-left">
        <div className="brand-header">
          <img src="logo.png" alt="ตราสัญลักษณ์ระบบ" />
          <div>
            <div className="org-tag">Ministry of Public Health</div>
            <h2>โรงพยาบาลเขวาสินรินทร์</h2>
            <div className="sub-en">Khwao Sinrin Hospital</div>
          </div>
        </div>

        <div className="system-card">
          <div className="sc-title">
            <div className="sc-icon"><Icon name="shield" size={18} /></div>
            ระบบติดตามยาเสพติด/วัตถุออกฤทธิ์ต่อจิตประสาท
          </div>
          <p>บันทึก ติดตาม และควบคุมการใช้ยาเสพติด/วัตถุออกฤทธิ์ต่อจิตประสาท ตามมาตรฐานกระทรวงสาธารณสุข เพื่อความปลอดภัยของผู้ป่วยและความถูกต้องของข้อมูล</p>
        </div>

        <div className="feature-grid">
          {FEATURES.map((f, i) => (
            <div className="feature-tile" key={i}>
              <div className="ft-icon"><Icon name={f.icon} size={18} /></div>
              <h4>{f.title}</h4>
              <p>{f.desc}</p>
            </div>
          ))}
        </div>
      </div>

      <div className="split-right">
        <form className="right-form" onSubmit={submit}>
          <div className="welcome-icon"><Icon name="lock" size={22} stroke="#123a63" /></div>
          <h2>ยินดีต้อนรับ</h2>
          <div className="sub">เข้าสู่ระบบเพื่อดำเนินการต่อ — ใช้แทนการลงลายมือชื่อผู้ปฏิบัติงาน</div>

          <div className="field field-icon">
            <label>ชื่อผู้ใช้ (Username)</label>
            <span className="fi-icon"><Icon name="user" size={16} /></span>
            <input value={username} onChange={e => setUsername(e.target.value)} placeholder="กรอก username" autoFocus />
          </div>
          <div className="field field-icon">
            <label>รหัสผ่าน</label>
            <span className="fi-icon"><Icon name="lock" size={16} /></span>
            <input type={showPassword ? "text" : "password"} value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" />
            <button type="button" className="toggle-eye" onClick={() => setShowPassword(!showPassword)} tabIndex={-1}>
              <Icon name={showPassword ? "eye-off" : "eye"} size={17} />
            </button>
          </div>

          <button className="btn-primary" type="submit" disabled={loading}>
            <Icon name="login-arrow" size={17} />
            {loading ? "กำลังเข้าสู่ระบบ..." : "เข้าสู่ระบบ"}
          </button>

          {error && <div className="login-error">{error}</div>}
          <div className="login-footnote">
            ระบบสงวนสิทธิ์สำหรับบุคลากรโรงพยาบาลเขวาสินรินทร์เท่านั้น<br/>
            ข้อมูลภายในระบบถือเป็นความลับตามระเบียบของหน่วยงาน
            <div className="dev-credit" style={{marginTop: "10px"}}>
              พัฒนาโดย ภญ.อรณี ปัตถาติ<br/>
              กลุ่มงานเภสัชกรรมและคุ้มครองผู้บริโภค โรงพยาบาลเขวาสินรินทร์
            </div>
          </div>
        </form>
      </div>
    </div>
  );
}

function HubView({ session, onLogout }) {
  const tiles = ALL_TILES.filter(t => t.roles.indexOf(session.role) !== -1);
  const now = new Date();
  const dateStr = now.toLocaleDateString("th-TH", { year: "numeric", month: "long", day: "numeric" });
  const timeStr = now.toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });

  return (
    <>
      <OfficialBand />
      <div className="page">
        <div className="greeting-card">
          <div>
            <div className="who">
              สวัสดีคุณ {session.displayName || session.username}
              <span className="role-tag">{session.role === "admin" ? "ผู้ดูแลระบบ" : "ผู้ปฏิบัติงาน"}</span>
            </div>
            <div className="when">วันนี้ {dateStr} เวลา {timeStr} น.</div>
          </div>
          <button className="btn-logout" onClick={onLogout}>
            <span style={{display: "inline-flex", alignItems: "center", gap: "6px"}}>
              <Icon name="logout" size={16} /> ออกจากระบบ
            </span>
          </button>
        </div>

        <div className="section-title">เมนูใช้งาน</div>
        <div className="tile-grid">
          {tiles.map((t, i) => (
            <a className="tile" href={t.href} key={i} style={{animationDelay: `${i * 0.04}s`, "--tile-wash": t.iconBg, "--icon-fg": t.iconFg}}>
              <div className="tile-icon" style={{"--icon-bg": t.iconBg, "--icon-fg": t.iconFg}}>
                <Icon name={t.icon} size={22} />
              </div>
              <div className="tile-body">
                <h3>{t.title}</h3>
                <p>{t.desc}</p>
              </div>
              <div className="tile-chevron"><Icon name="chevron" size={18} /></div>
            </a>
          ))}
        </div>

        <div className="footer-note">
          ระบบนี้จัดทำเพื่อการปฏิบัติงานภายในกลุ่มงานเภสัชกรรมเท่านั้น<br/>
          ห้ามเผยแพร่ข้อมูลภายในระบบต่อบุคคลภายนอกโดยไม่ได้รับอนุญาต
          <div className="dev-credit" style={{marginTop: "10px"}}>
            พัฒนาโดย ภญ.อรณี ปัตถาติ · กลุ่มงานเภสัชกรรมและคุ้มครองผู้บริโภค โรงพยาบาลเขวาสินรินทร์
          </div>
        </div>
      </div>
    </>
  );
}

function App() {
  const [session, setSession] = useState(loadSession());

  const logout = async () => {
    if (session && session.token) {
      fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "logout", token: session.token }) }).catch(() => {});
    }
    localStorage.removeItem("narcoticsSession");
    setSession(null);
  };

  return session ? <HubView session={session} onLogout={logout} /> : <LoginView onLoggedIn={setSession} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
