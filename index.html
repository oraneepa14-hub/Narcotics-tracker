<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ระบบยืนยันจำนวนยาเสพติด/วัตถุออกฤทธิ์ต่อจิตประสาท</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { font-family: 'Sarabun', 'Noto Sans Thai', sans-serif; background: #f4f0fa; margin: 0; }
  .app { max-width: 480px; margin: 0 auto; padding: 24px 16px; }
  .card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 2px 10px rgba(107,70,193,0.12); margin-bottom: 16px; }
  h1 { font-size: 1.3rem; color: #5b21b6; margin-bottom: 4px; }
  .sub { color: #777; font-size: 0.9rem; margin-bottom: 16px; }
  label { display: block; font-size: 0.9rem; color: #444; margin: 10px 0 4px; }
  select, input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
  button { width: 100%; padding: 12px; background: #7c3aed; color: #fff; border: none; border-radius: 10px; font-size: 1rem; margin-top: 16px; cursor: pointer; }
  button:disabled { background: #ccc; }
  .status { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 0.9rem; }
  .ok { background: #dcfce7; color: #166534; }
  .err { background: #fee2e2; color: #991b1b; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// TODO: แก้เป็น URL ของ Apps Script Web App หลัง deploy
const API_URL = "https://script.google.com/macros/s/AKfycbySWsFY_OUrmu9s4WEiL8G0bW1OWN8ONFW3cNzemF1VaZXLmw1uh6n7gGkDg4x1lnz-nQ/exec";

function App() {
  const [staffName, setStaffName] = useState("");
  const [staffUsername, setStaffUsername] = useState("");
  const [storagePoint, setStoragePoint] = useState("main_warehouse");
  const [notes, setNotes] = useState("");
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    if (!staffName || !staffUsername) {
      setStatus({ ok: false, msg: "กรุณากรอกชื่อและ username ให้ครบ" });
      return;
    }
    setLoading(true);
    setStatus(null);
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "submitShiftCheckin",
          staffName,
          staffUsername,
          storagePoint,
          confirmedCounts: [], // TODO: ต่อยอดฟอร์มกรอกจำนวนแต่ละรายการ
          notes
        })
      });
      const data = await res.json();
      if (data.success) {
        setStatus({ ok: true, msg: `ยืนยันสำเร็จ (เวร: ${data.shiftType === 'morning' ? 'เช้า' : 'บ่าย/ดึก'})` });
      } else {
        setStatus({ ok: false, msg: data.error || "เกิดข้อผิดพลาด" });
      }
    } catch (err) {
      setStatus({ ok: false, msg: "เชื่อมต่อระบบไม่สำเร็จ: " + err.message });
    }
    setLoading(false);
  };

  return (
    <div className="app">
      <div className="card">
        <h1>ยืนยันจำนวนคงเหลือยาเสพติด/วัตถุออกฤทธิ์</h1>
        <div className="sub">การกดยืนยันถือเป็นการลงลายมือชื่อผู้ปฏิบัติงานเวรนี้</div>

        <label>ชื่อ-สกุลผู้ปฏิบัติงาน</label>
        <input value={staffName} onChange={e => setStaffName(e.target.value)} placeholder="เช่น นางสาวโอฬารี ..." />

        <label>Username</label>
        <input value={staffUsername} onChange={e => setStaffUsername(e.target.value)} placeholder="username สำหรับ login" />

        <label>จุดที่ตรวจนับ</label>
        <select value={storagePoint} onChange={e => setStoragePoint(e.target.value)}>
          <option value="main_warehouse">คลังยาใหญ่</option>
          <option value="sub_warehouse">คลังยาย่อย</option>
          <option value="er_cabinet">ตู้ยาเสพติด ER นอกเวลา</option>
        </select>

        <label>หมายเหตุ (ถ้ามี)</label>
        <textarea rows="3" value={notes} onChange={e => setNotes(e.target.value)} />

        <button onClick={submit} disabled={loading}>
          {loading ? "กำลังบันทึก..." : "ยืนยันจำนวนคงเหลือ"}
        </button>

        {status && (
          <div className={`status ${status.ok ? "ok" : "err"}`}>{status.msg}</div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
