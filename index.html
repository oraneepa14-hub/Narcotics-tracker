<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ระบบติดตามยาเสพติด/วัตถุออกฤทธิ์ต่อจิตประสาท — เขวาสินรินทร์</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap');

  :root {
    --ink: #3d3a4e;
    --sub-ink: #726f85;
    --lavender: #ede9fe;
    --lavender-deep: #7c3aed;
    --mint: #d1fae5;
    --mint-deep: #059669;
    --peach: #ffe4d6;
    --peach-deep: #ea580c;
    --sky: #dbeafe;
    --sky-deep: #2563eb;
    --blush: #fce7f3;
    --blush-deep: #db2777;
    --butter: #fef9c3;
    --butter-deep: #ca8a04;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Sarabun', 'Noto Sans Thai', sans-serif;
    margin: 0;
    color: var(--ink);
    min-height: 100vh;
    background:
      radial-gradient(circle at 8% 12%, rgba(196,181,253,0.35), transparent 40%),
      radial-gradient(circle at 92% 18%, rgba(253,224,71,0.25), transparent 40%),
      radial-gradient(circle at 15% 92%, rgba(167,243,208,0.35), transparent 40%),
      radial-gradient(circle at 88% 88%, rgba(251,207,232,0.3), transparent 40%),
      linear-gradient(180deg, #fbfaff 0%, #f7f5ff 100%);
    background-attachment: fixed;
  }

  .page { max-width: 1120px; margin: 0 auto; padding: 32px 24px 64px; }

  .brand-row {
    display: flex; align-items: center; gap: 16px; margin-bottom: 8px;
    animation: fadeDown 0.6s ease both;
  }
  .brand-badge {
    width: 52px; height: 52px; border-radius: 18px;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; box-shadow: 0 8px 20px rgba(124,58,237,0.28);
    flex-shrink: 0;
  }
  .brand-text h1 { font-size: 1.35rem; margin: 0; color: #4c1d95; font-weight: 700; }
  .brand-text p { margin: 2px 0 0; color: var(--sub-ink); font-size: 0.92rem; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes floaty { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }

  /* ---------- Login ---------- */
  .login-wrap {
    display: flex; justify-content: center; align-items: center;
    min-height: 70vh;
  }
  .login-card {
    background: #ffffffee;
    border-radius: 28px;
    padding: 40px 36px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(124,58,237,0.14), 0 2px 8px rgba(0,0,0,0.03);
    text-align: center;
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }
  .login-card::before {
    content: "";
    position: absolute; top: -60px; right: -60px; width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(196,181,253,0.5), transparent 70%);
    border-radius: 50%;
  }
  .login-emoji { font-size: 2.6rem; animation: floaty 3.5s ease-in-out infinite; display: inline-block; }
  .login-card h2 { margin: 12px 0 4px; font-size: 1.2rem; color: #4c1d95; }
  .login-card .sub { color: var(--sub-ink); font-size: 0.88rem; margin-bottom: 24px; }

  .field { text-align: left; margin-bottom: 14px; position: relative; z-index: 1; }
  .field label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 5px; font-weight: 500; }
  .field input {
    width: 100%; padding: 12px 14px; border-radius: 14px; border: 1.5px solid #e5e0f7;
    font-size: 0.95rem; font-family: inherit; background: #fbfaff;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    outline: none; border-color: #a78bfa; box-shadow: 0 0 0 4px rgba(167,139,250,0.15);
  }

  .btn-primary {
    width: 100%; padding: 13px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer;
    font-family: inherit; margin-top: 6px;
    box-shadow: 0 8px 18px rgba(124,58,237,0.28);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(124,58,237,0.35); }
  .btn-primary:active { transform: translateY(0px); }
  .btn-primary:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; transform: none; }

  .login-error {
    background: #fee2e2; color: #991b1b; border-radius: 12px; padding: 10px 14px;
    font-size: 0.85rem; margin-top: 14px; text-align: left; position: relative; z-index: 1;
  }
  .login-footnote { margin-top: 20px; font-size: 0.78rem; color: #a89fc4; position: relative; z-index: 1; }

  /* ---------- Hub ---------- */
  .greeting-card {
    background: linear-gradient(120deg, #f5f3ff, #fdf4ff);
    border-radius: 24px; padding: 22px 28px; margin: 24px 0 32px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px;
    box-shadow: 0 4px 20px rgba(124,58,237,0.08);
    animation: fadeUp 0.5s ease both;
  }
  .greeting-card .who { font-size: 1.05rem; color: #4c1d95; font-weight: 600; }
  .greeting-card .who span.role-tag {
    background: #ede9fe; color: #6d28d9; padding: 3px 12px; border-radius: 999px;
    font-size: 0.78rem; margin-left: 10px; font-weight: 500;
  }
  .greeting-card .when { color: var(--sub-ink); font-size: 0.88rem; margin-top: 4px; }
  .btn-logout {
    background: #fff; color: #991b1b; border: 1.5px solid #fecaca; padding: 9px 18px;
    border-radius: 12px; font-family: inherit; font-size: 0.88rem; cursor: pointer; font-weight: 500;
    transition: background 0.15s;
  }
  .btn-logout:hover { background: #fef2f2; }

  .section-title { font-size: 1.05rem; color: #4c1d95; font-weight: 600; margin: 28px 0 14px; }

  .tile-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;
  }
  @media (max-width: 900px) { .tile-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .tile-grid { grid-template-columns: 1fr; } }

  .tile {
    display: block; text-decoration: none; color: inherit;
    border-radius: 22px; padding: 22px; position: relative; overflow: hidden;
    box-shadow: 0 6px 18px rgba(80,60,140,0.08);
    transition: transform 0.22s ease, box-shadow 0.22s ease;
    animation: fadeUp 0.5s ease both;
  }
  .tile:hover { transform: translateY(-5px) scale(1.015); box-shadow: 0 16px 32px rgba(80,60,140,0.16); }
  .tile .tile-icon {
    width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; margin-bottom: 14px; background: rgba(255,255,255,0.65);
  }
  .tile h3 { margin: 0 0 6px; font-size: 1.02rem; }
  .tile p { margin: 0; font-size: 0.85rem; color: rgba(45,40,70,0.65); line-height: 1.5; }
  .tile .tile-arrow { position: absolute; right: 18px; bottom: 18px; font-size: 1.1rem; opacity: 0.35; transition: transform 0.2s, opacity 0.2s; }
  .tile:hover .tile-arrow { transform: translateX(4px); opacity: 0.7; }

  .tile.c-lavender { background: linear-gradient(150deg, var(--lavender), #ffffff 70%); }
  .tile.c-mint { background: linear-gradient(150deg, var(--mint), #ffffff 70%); }
  .tile.c-peach { background: linear-gradient(150deg, var(--peach), #ffffff 70%); }
  .tile.c-sky { background: linear-gradient(150deg, var(--sky), #ffffff 70%); }
  .tile.c-blush { background: linear-gradient(150deg, var(--blush), #ffffff 70%); }
  .tile.c-butter { background: linear-gradient(150deg, var(--butter), #ffffff 70%); }

  .footer-note {
    text-align: center; margin-top: 48px; color: #b3aacb; font-size: 0.8rem;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// URL ของ Apps Script Web App
const API_URL = "https://script.google.com/macros/s/AKfycbxpNAS-o0fcxYeCorsy6vRI6XkfFeWOEfBLRZ2VbMcHANn2ijkKWhNa92EwCp5aotv5jw/exec";

const ALL_TILES = [
  {
    href: "checkin.html", roles: ["staff", "admin"], color: "c-lavender", icon: "🌿",
    title: "ยืนยันจำนวนคงเหลือ", desc: "ตรวจนับและยืนยันจำนวนคงเหลือยาเสพติด/วัตถุออกฤทธิ์ ประจำเวร — คลังยาย่อย"
  },
  {
    href: "dispensing.html", roles: ["staff", "admin"], color: "c-mint", icon: "💊",
    title: "เบิกยาให้ผู้ป่วยเฉพาะราย", desc: "บันทึกการเบิกจ่ายรายบุคคล พร้อมติดตามใบ ย.ส.2/ว.จ.2 — คลังยาย่อย/ตู้ ER"
  },
  {
    href: "resources.html", roles: ["staff", "admin"], color: "c-butter", icon: "📎",
    title: "เอกสารและลิงก์ที่เกี่ยวข้อง", desc: "ดาวน์โหลดแบบฟอร์ม เอกสารอ้างอิง และลิงก์เว็บที่เกี่ยวข้องกับงาน"
  },
  {
    href: "stock-ledger.html", roles: ["admin"], color: "c-sky", icon: "🏬",
    title: "คลังยาเสพติด 3 จุด", desc: "ภาพรวม รับเข้า โอนย้าย และปรับปรุงข้อมูลคงคลังทั้งคลังใหญ่ ย่อย และตู้ ER"
  },
  {
    href: "admin-stock.html", roles: ["admin"], color: "c-blush", icon: "🗂️",
    title: "ฐานข้อมูลยา (Admin)", desc: "นำเข้า/แก้ไขรายการยาในคลัง และจัดการฐานข้อมูลยาอ้างอิง (Drug Master)"
  },
  {
    href: "shift-history.html", roles: ["admin"], color: "c-lavender", icon: "🕰️",
    title: "ประวัติการยืนยันคงเหลือ", desc: "ย้อนดูประวัติการยืนยันรายเวร พร้อมออกรายงาน Excel และ PDF"
  },
  {
    href: "reports.html", roles: ["admin"], color: "c-peach", icon: "📊",
    title: "รายงาน Skynet รายเดือน", desc: "สรุปยอดตั้งต้น รับเข้า จ่ายออก และมูลค่าคงเหลือ พร้อมแนบไฟล์ยืนยันการส่งรายงาน"
  }
];

function loadSession() {
  try {
    const s = JSON.parse(localStorage.getItem("narcoticsSession"));
    if (s && s.token && s.expiresAt && new Date(s.expiresAt) > new Date()) return s;
  } catch (e) {}
  return null;
}

function LoginView({ onLoggedIn }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const submit = async (e) => {
    e.preventDefault();
    if (!username || !password) {
      setError("กรุณากรอก Username และรหัสผ่านให้ครบ");
      return;
    }
    setLoading(true);
    setError(null);
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "login", username, password })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem("narcoticsSession", JSON.stringify(data));
        onLoggedIn(data);
      } else {
        setError(data.error || "เข้าสู่ระบบไม่สำเร็จ");
      }
    } catch (err) {
      setError("เชื่อมต่อระบบไม่สำเร็จ: " + err.message);
    }
    setLoading(false);
  };

  return (
    <div className="login-wrap">
      <form className="login-card" onSubmit={submit}>
        <div className="login-emoji">🌸</div>
        <h2>เข้าสู่ระบบ</h2>
        <div className="sub">ใช้แทนการลงลายมือชื่อผู้ปฏิบัติงาน<br/>กรุณาเข้าสู่ระบบด้วยบัญชีของท่าน</div>

        <div className="field">
          <label>Username</label>
          <input value={username} onChange={e => setUsername(e.target.value)} autoFocus />
        </div>
        <div className="field">
          <label>รหัสผ่าน</label>
          <input type="password" value={password} onChange={e => setPassword(e.target.value)} />
        </div>

        <button className="btn-primary" type="submit" disabled={loading}>
          {loading ? "กำลังเข้าสู่ระบบ..." : "เข้าสู่ระบบ"}
        </button>

        {error && <div className="login-error">{error}</div>}
        <div className="login-footnote">ระบบติดตามยาเสพติด/วัตถุออกฤทธิ์ต่อจิตประสาท<br/>กลุ่มงานเภสัชกรรม โรงพยาบาลเขวาสินรินทร์</div>
      </form>
    </div>
  );
}

function HubView({ session, onLogout }) {
  const tiles = ALL_TILES.filter(t => t.roles.indexOf(session.role) !== -1);
  const now = new Date();
  const dateStr = now.toLocaleDateString("th-TH", { year: "numeric", month: "long", day: "numeric" });
  const timeStr = now.toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });

  return (
    <div>
      <div className="brand-row">
        <div className="brand-badge">🌿</div>
        <div className="brand-text">
          <h1>ระบบติดตามยาเสพติด/วัตถุออกฤทธิ์ต่อจิตประสาท</h1>
          <p>กลุ่มงานเภสัชกรรม โรงพยาบาลเขวาสินรินทร์</p>
        </div>
      </div>

      <div className="greeting-card">
        <div>
          <div className="who">
            สวัสดีคุณ {session.displayName || session.username}
            <span className="role-tag">{session.role === "admin" ? "ผู้ดูแลระบบ" : "ผู้ปฏิบัติงาน"}</span>
          </div>
          <div className="when">วันนี้ {dateStr} เวลา {timeStr} น.</div>
        </div>
        <button className="btn-logout" onClick={onLogout}>ออกจากระบบ</button>
      </div>

      <div className="section-title">เมนูใช้งาน</div>
      <div className="tile-grid">
        {tiles.map((t, i) => (
          <a className={`tile ${t.color}`} href={t.href} key={i} style={{animationDelay: `${i * 0.05}s`}}>
            <div className="tile-icon">{t.icon}</div>
            <h3>{t.title}</h3>
            <p>{t.desc}</p>
            <span className="tile-arrow">→</span>
          </a>
        ))}
      </div>

      <div className="footer-note">ระบบนี้จัดทำเพื่อการปฏิบัติงานภายในเท่านั้น</div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(loadSession());

  const logout = async () => {
    if (session && session.token) {
      fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "logout", token: session.token }) }).catch(() => {});
    }
    localStorage.removeItem("narcoticsSession");
    setSession(null);
  };

  return (
    <div className="page">
      {session ? <HubView session={session} onLogout={logout} /> : <LoginView onLoggedIn={setSession} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
