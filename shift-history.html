<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ประวัติการยืนยันจำนวนคงเหลือ — คลังยาย่อย</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  body { font-family: 'Sarabun', 'Noto Sans Thai', sans-serif; margin: 0; overflow-x: hidden; background: radial-gradient(circle at 6% 15%, rgba(18,147,159,0.08), transparent 42%), radial-gradient(circle at 95% 12%, rgba(183,134,42,0.07), transparent 40%), radial-gradient(circle at 12% 92%, rgba(26,74,122,0.07), transparent 42%), radial-gradient(circle at 90% 90%, rgba(14,124,134,0.07), transparent 42%), #f4f7fa; background-attachment: fixed; }
  .app { width: 100%; max-width: 100%; margin: 0; padding: 28px clamp(20px, 3vw, 56px) 48px; box-sizing: border-box; }
  .card { background: #fff; border-radius: 14px; padding: 16px 20px; box-shadow: 0 2px 10px rgba(11,36,64,0.08); margin-bottom: 12px; }
  h1 { font-size: 1.25rem; color: #0b2440; margin: 0 0 4px; }
  h2 { font-size: 1rem; color: #0b2440; margin: 0 0 8px; }
  .sub { color: #777; font-size: 0.9rem; margin-bottom: 16px; }
  label { display: block; font-size: 0.9rem; color: #444; margin: 10px 0 4px; }
  select, input, textarea { padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; font-family: inherit; width: 100%; }
  button { padding: 10px 16px; background: #123a63; color: #fff; border: none; border-radius: 10px; font-size: 0.95rem; cursor: pointer; }
  button.secondary { background: #eef4f8; color: #0b2440; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  .status { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 0.9rem; }
  .ok { background: #dcfce7; color: #166534; }
  .err { background: #fee2e2; color: #991b1b; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th, td { padding: 6px; border-bottom: 1px solid #eee; text-align: left; vertical-align: top; }
  th { color: #666; font-weight: 600; font-size: 0.78rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .scroll-table { max-height: min(620px, 64vh); overflow: auto; border: 1px solid #eee; border-radius: 8px; }
  .log-row { cursor: pointer; }
  .log-row:hover { background: #faf5ff; }
  .detail-row td { background: #faf9ff; padding: 12px; }
  .mismatch-badge { color: #c2410c; font-size: 0.75rem; margin-left: 6px; }
  .item-table { width: 100%; font-size: 0.8rem; }
  .item-table th, .item-table td { padding: 4px 6px; }
</style>
<script>
(function() {
  var REQUIRED_ROLES = ["admin"];
  var session = null;
  try { session = JSON.parse(localStorage.getItem("narcoticsSession")); } catch (e) {}
  var now = new Date();
  if (!session || !session.token || !session.expiresAt || new Date(session.expiresAt) < now) {
    localStorage.removeItem("narcoticsSession");
    window.location.href = "index.html";
  } else if (REQUIRED_ROLES.indexOf(session.role) === -1) {
    window.location.href = "index.html";
  } else {
    window.NARCOTICS_SESSION = session;
  }
})();
</script>
</head>
<body>
<div id="narcoticsTopbar" style="display:flex;align-items:center;justify-content:flex-end;gap:12px;background:#0b2440;padding:9px 22px;font-family:'Sarabun','Noto Sans Thai',sans-serif;font-size:0.85rem;color:#cbd5e1;border-bottom:1px solid #123a63;">
  <a href="index.html" style="color:#ffffff;text-decoration:none;font-weight:600;margin-right:auto;">&larr; กลับหน้าหลัก</a>
  <span>เข้าสู่ระบบในนาม <b id="narcoticsUserName" style="color:#ffffff;"></b></span>
  <span id="narcoticsUserRole" style="background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.2);padding:2px 10px;border-radius:6px;font-size:0.78rem;"></span>
  <button onclick="narcoticsLogout()" style="background:transparent;color:#fca5a5;border:1px solid rgba(252,165,165,0.4);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem;">ออกจากระบบ</button>
</div>
<script>
  (function() {
    var s = window.NARCOTICS_SESSION;
    if (!s) return;
    document.getElementById("narcoticsUserName").textContent = s.displayName || s.username;
    document.getElementById("narcoticsUserRole").textContent = s.role === "admin" ? "ผู้ดูแลระบบ" : "ผู้ปฏิบัติงาน";
  })();
  function narcoticsLogout() {
    var s = window.NARCOTICS_SESSION;
    localStorage.removeItem("narcoticsSession");
    if (s && s.token && typeof API_URL !== "undefined") {
      fetch(API_URL, { method: "POST", body: JSON.stringify({ token: (window.NARCOTICS_SESSION||{}).token,  action: "logout", token: s.token }) }).catch(function(){});
    }
    window.location.href = "index.html";
  }
</script>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// URL ของ Apps Script Web App
const API_URL = "https://script.google.com/macros/s/AKfycbxpNAS-o0fcxYeCorsy6vRI6XkfFeWOEfBLRZ2VbMcHANn2ijkKWhNa92EwCp5aotv5jw/exec";

function shiftLabel(shiftType) {
  return shiftType === "morning" ? "เช้า (08:00-16:00)" : "บ่าย/ดึก (16:00-24:00)";
}

function fmt(n) {
  if (n === "" || n === undefined || n === null) return "-";
  const num = Number(n);
  return isNaN(num) ? n : num.toLocaleString();
}

// jsPDF ไม่มีฟอนต์ไทยในตัว (ข้อความไทยจะไม่แสดงเลยถ้าไม่โหลดฟอนต์เพิ่ม)
// โหลดฟอนต์ไทย (Sarabun) มาแปลงเป็น base64 แล้วฝังเข้า jsPDF ครั้งเดียว แคชไว้ใช้ซ้ำ
let cachedThaiFontBase64 = null;
async function loadThaiFontBase64() {
  if (cachedThaiFontBase64) return cachedThaiFontBase64;
  const res = await fetch("https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/sarabun/Sarabun-Regular.ttf");
  if (!res.ok) throw new Error("โหลดฟอนต์ไทยไม่สำเร็จ");
  const buf = await res.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let binary = "";
  const chunkSize = 8192;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
  }
  cachedThaiFontBase64 = btoa(binary);
  return cachedThaiFontBase64;
}

async function setupThaiFont(doc) {
  const base64 = await loadThaiFontBase64();
  doc.addFileToVFS("Sarabun-Regular.ttf", base64);
  doc.addFont("Sarabun-Regular.ttf", "Sarabun", "normal");
  doc.addFont("Sarabun-Regular.ttf", "Sarabun", "bold"); // ใช้ไฟล์เดียวกัน เพราะไม่มี bold แยก
  doc.setFont("Sarabun", "normal");
}

function App() {
  const [startDate, setStartDate] = useState("");
  const [endDate, setEndDate] = useState("");
  const [rows, setRows] = useState(null);
  const [expandedId, setExpandedId] = useState(null);
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);
  const isAdmin = (window.NARCOTICS_SESSION || {}).role === "admin";
  const [editState, setEditState] = useState(null); // { logId, confirmedCounts, notes }
  const [saving, setSaving] = useState(false);

  const startEdit = (r) => {
    setExpandedId(r.logId);
    setEditState({
      logId: r.logId,
      confirmedCounts: (r.confirmedCounts || []).map(it => ({ ...it })),
      notes: r.notes || ""
    });
  };

  const updateEditItem = (idx, field, value) => {
    setEditState(prev => {
      const items = prev.confirmedCounts.map((it, i) => i === idx ? { ...it, [field]: value } : it);
      return { ...prev, confirmedCounts: items };
    });
  };

  const saveEdit = async () => {
    setSaving(true);
    setStatus(null);
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          token: (window.NARCOTICS_SESSION||{}).token,
          action: "updateShiftCheckinLog",
          logId: editState.logId,
          confirmedCounts: editState.confirmedCounts,
          notes: editState.notes
        })
      });
      const data = await res.json();
      if (data.success) {
        setStatus({ ok: true, msg: "แก้ไขข้อมูลเรียบร้อยแล้ว" });
        setEditState(null);
        runSearch();
      } else {
        setStatus({ ok: false, msg: data.error });
      }
    } catch (err) {
      setStatus({ ok: false, msg: "เชื่อมต่อไม่สำเร็จ: " + err.message });
    }
    setSaving(false);
  };

  const runSearch = async () => {
    setLoading(true);
    setStatus(null);
    try {
      const params = new URLSearchParams({ action: "getShiftCheckinHistory" });
      params.set("token", (window.NARCOTICS_SESSION||{}).token);
      if (startDate) params.set("startDate", startDate);
      if (endDate) params.set("endDate", endDate);
      const res = await fetch(`${API_URL}?${params.toString()}`);
      const data = await res.json();
      if (data.success) {
        setRows(data.data);
        if (data.data.length === 0) setStatus({ ok: true, msg: "ไม่พบข้อมูลในช่วงที่เลือก" });
      } else {
        setStatus({ ok: false, msg: data.error });
      }
    } catch (err) {
      setStatus({ ok: false, msg: "เชื่อมต่อไม่สำเร็จ: " + err.message });
    }
    setLoading(false);
  };

  useEffect(() => { runSearch(); }, []);

  // แปลงข้อมูลเป็นแบบ 1 แถวต่อ 1 รายการยา (สำหรับ export)
  const buildFlatRows = () => {
    const flat = [];
    (rows || []).forEach(r => {
      const items = r.confirmedCounts && r.confirmedCounts.length > 0 ? r.confirmedCounts : [null];
      items.forEach(it => {
        flat.push({
          shiftDate: r.shiftDate,
          shiftType: shiftLabel(r.shiftType),
          timestamp: r.timestamp,
          staffName: r.staffName,
          staffUsername: r.staffUsername,
          itemName: it ? it.itemName : "",
          systemQty: it ? it.systemQty : "",
          countedQty: it ? it.countedQty : "",
          itemNote: it ? (it.note || "") : "",
          overallNotes: r.notes || ""
        });
      });
    });
    return flat;
  };

  const exportExcel = () => {
    const flat = buildFlatRows();
    if (flat.length === 0) return;
    const sheetData = flat.map(r => ({
      "วันที่": r.shiftDate,
      "เวร": r.shiftType,
      "เวลาที่บันทึก": r.timestamp,
      "ผู้บันทึก": r.staffName,
      "Username": r.staffUsername,
      "รายชื่อยา": r.itemName,
      "จำนวนในระบบ": r.systemQty,
      "จำนวนที่ยืนยัน": r.countedQty,
      "หมายเหตุรายการ": r.itemNote,
      "หมายเหตุรวมของเวร": r.overallNotes
    }));
    const ws = XLSX.utils.json_to_sheet(sheetData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "ประวัติยืนยันคลังยาย่อย");
    const suffix = (startDate || "all") + "_to_" + (endDate || "all");
    XLSX.writeFile(wb, `shift-checkin-report-${suffix}.xlsx`);
  };

  const [pdfLoading, setPdfLoading] = useState(false);

  const exportPDF = async () => {
    if (!rows || rows.length === 0) return;
    setPdfLoading(true);
    setStatus(null);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "landscape" });

      try {
        await setupThaiFont(doc);
      } catch (fontErr) {
        setStatus({ ok: false, msg: "โหลดฟอนต์ไทยไม่สำเร็จ (ข้อความไทยในไฟล์ PDF อาจแสดงไม่ถูกต้อง): " + fontErr.message });
      }

      const marginLeft = 10;

      // แถวเดียว = 1 รายการยา ผสมข้อมูลเวร+ยา ไว้ในแถวเดียวกัน เพื่อให้ตารางต่อเนื่อง
      // จัด pagination อัตโนมัติโดย autoTable เอง (ไม่เสียพื้นที่ว่างระหว่างกลุ่ม)
      const body = [];
      const groupStartRows = []; // แถวไหนคือแถวแรกของแต่ละเวร (ไว้ทำเส้นคั่นกลุ่ม)
      rows.forEach(r => {
        const items = r.confirmedCounts && r.confirmedCounts.length > 0 ? r.confirmedCounts : [null];
        items.forEach((it, itemIdx) => {
          if (itemIdx === 0) groupStartRows.push(body.length);
          body.push([
            itemIdx === 0 ? r.shiftDate : "",
            itemIdx === 0 ? shiftLabel(r.shiftType) : "",
            itemIdx === 0 ? r.timestamp : "",
            itemIdx === 0 ? `${r.staffName || "-"}` : "",
            it ? it.itemName : "- ไม่มีรายการยา -",
            it ? fmt(it.systemQty) : "",
            it ? fmt(it.countedQty) : "",
            it ? (it.note || "") : "",
            itemIdx === 0 ? (r.notes || "") : ""
          ]);
        });
      });

      doc.setFontSize(12);
      doc.setTextColor(91, 33, 182);
      doc.text("รายงานประวัติการยืนยันจำนวนคงเหลือ — คลังยาย่อย", marginLeft, 10);
      doc.setFontSize(8);
      doc.setTextColor(100);
      doc.text(`ช่วงวันที่: ${startDate || "ทั้งหมด"} ถึง ${endDate || "ทั้งหมด"}   |   จำนวนเวร: ${rows.length}`, marginLeft, 15);

      const groupStartSet = new Set(groupStartRows);

      doc.autoTable({
        startY: 19,
        margin: { left: marginLeft, right: marginLeft, bottom: 10 },
        head: [["วันที่", "เวร", "บันทึกเมื่อ", "ผู้บันทึก", "รายชื่อยา", "ระบบ", "ยืนยัน", "หมายเหตุรายการ", "หมายเหตุรวม"]],
        body: body,
        styles: { fontSize: 7, cellPadding: 1.3, font: "Sarabun", overflow: "linebreak" },
        headStyles: { fillColor: [124, 58, 237], textColor: 255, font: "Sarabun", fontSize: 7.5 },
        columnStyles: {
          0: { cellWidth: 20 }, 1: { cellWidth: 22 }, 2: { cellWidth: 24 }, 3: { cellWidth: 26 },
          4: { cellWidth: 48 }, 5: { cellWidth: 14 }, 6: { cellWidth: 14 },
          7: { cellWidth: 35 }, 8: { cellWidth: "auto" }
        },
        didParseCell: function (data) {
          if (data.section === "body") {
            const rowData = body[data.row.index];
            const systemQty = rowData[5];
            const countedQty = rowData[6];
            if (data.column.index === 6 && countedQty !== "" && String(countedQty) !== String(systemQty)) {
              data.cell.styles.textColor = [194, 65, 12];
              data.cell.styles.fontStyle = "bold";
            }
            // เส้นคั่นบางๆ ด้านบนของแถวแรกในแต่ละเวร ให้แยกกลุ่มเห็นชัดโดยไม่กินพื้นที่
            if (groupStartSet.has(data.row.index) && data.row.index !== 0) {
              data.cell.styles.lineWidth = { top: 0.5, right: 0.1, bottom: 0.1, left: 0.1 };
              data.cell.styles.lineColor = [124, 58, 237];
            }
          }
        }
      });

      const suffix = (startDate || "all") + "_to_" + (endDate || "all");
      doc.save(`shift-checkin-report-${suffix}.pdf`);
    } catch (err) {
      setStatus({ ok: false, msg: "สร้าง PDF ไม่สำเร็จ: " + err.message });
    }
    setPdfLoading(false);
  };

  return (
    <div className="app">
      <div className="card">
        <h1>ประวัติการยืนยันจำนวนคงเหลือ — คลังยาย่อย</h1>
        <div className="sub">เลือกช่วงวันที่เพื่อดูประวัติการบันทึกยืนยันจำนวนคงเหลือรายเวร คลิกแถวเพื่อดูรายละเอียดรายการยา</div>

        <div className="form-row">
          <div><label>วันที่เริ่มต้น</label><input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} /></div>
          <div><label>วันที่สิ้นสุด</label><input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} /></div>
        </div>

        <div style={{display: "flex", gap: "10px", marginTop: "16px", flexWrap: "wrap"}}>
          <button disabled={loading} onClick={runSearch}>{loading ? "กำลังค้นหา..." : "ค้นหา"}</button>
          <button className="secondary" disabled={!rows || rows.length === 0} onClick={exportExcel}>📥 ดาวน์โหลด Excel</button>
          <button className="secondary" disabled={!rows || rows.length === 0 || pdfLoading} onClick={exportPDF}>
            {pdfLoading ? "กำลังสร้าง PDF..." : "📄 ดาวน์โหลด PDF"}
          </button>
        </div>

        {status && <div className={`status ${status.ok ? "ok" : "err"}`}>{status.msg}</div>}
      </div>

      <div className="card">
        {rows && rows.length > 0 && (
          <div className="scroll-table">
            <table>
              <thead>
                <tr>
                  <th>วันที่</th>
                  <th>เวร</th>
                  <th>เวลาที่บันทึก</th>
                  <th>ผู้บันทึก</th>
                  <th>จำนวนรายการยา</th>
                  <th>หมายเหตุ</th>
                  {isAdmin && <th></th>}
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => {
                  const isOpen = expandedId === r.logId;
                  const isEditing = editState && editState.logId === r.logId;
                  const mismatchCount = (r.confirmedCounts || []).filter(it => String(it.countedQty) !== String(it.systemQty)).length;
                  return (
                    <React.Fragment key={r.logId || i}>
                      <tr className="log-row" onClick={() => !isEditing && setExpandedId(isOpen ? null : r.logId)}>
                        <td>{r.shiftDate}</td>
                        <td>{shiftLabel(r.shiftType)}</td>
                        <td>{r.timestamp}</td>
                        <td>{r.staffName}</td>
                        <td>
                          {(r.confirmedCounts || []).length} รายการ
                          {mismatchCount > 0 && <span className="mismatch-badge">⚠ ไม่ตรง {mismatchCount} รายการ</span>}
                        </td>
                        <td>{r.notes}</td>
                        {isAdmin && (
                          <td onClick={e => e.stopPropagation()}>
                            {!isEditing && <button className="secondary" onClick={() => startEdit(r)}>แก้ไข</button>}
                          </td>
                        )}
                      </tr>
                      {isOpen && !isEditing && (
                        <tr className="detail-row">
                          <td colSpan={isAdmin ? 7 : 6}>
                            <table className="item-table">
                              <thead>
                                <tr>
                                  <th>รายชื่อยา</th>
                                  <th>จำนวนในระบบ</th>
                                  <th>จำนวนที่ยืนยัน</th>
                                  <th>หมายเหตุ</th>
                                </tr>
                              </thead>
                              <tbody>
                                {(r.confirmedCounts || []).map((it, j) => (
                                  <tr key={j}>
                                    <td>{it.itemName}</td>
                                    <td>{fmt(it.systemQty)}</td>
                                    <td>{fmt(it.countedQty)}</td>
                                    <td>{it.note}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </td>
                        </tr>
                      )}
                      {isOpen && isEditing && (
                        <tr className="detail-row">
                          <td colSpan={isAdmin ? 7 : 6}>
                            <table className="item-table">
                              <thead>
                                <tr>
                                  <th>รายชื่อยา</th>
                                  <th>จำนวนในระบบ</th>
                                  <th>จำนวนที่ยืนยัน (แก้ไขได้)</th>
                                  <th>หมายเหตุ (แก้ไขได้)</th>
                                </tr>
                              </thead>
                              <tbody>
                                {editState.confirmedCounts.map((it, j) => (
                                  <tr key={j}>
                                    <td>{it.itemName}</td>
                                    <td>{fmt(it.systemQty)}</td>
                                    <td style={{maxWidth: "100px"}}>
                                      <input type="number" value={it.countedQty} onChange={e => updateEditItem(j, "countedQty", e.target.value)} />
                                    </td>
                                    <td>
                                      <input type="text" value={it.note || ""} onChange={e => updateEditItem(j, "note", e.target.value)} />
                                    </td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                            <label style={{marginTop: "8px"}}>หมายเหตุรวมของเวรนี้</label>
                            <textarea rows="2" value={editState.notes} onChange={e => setEditState({ ...editState, notes: e.target.value })} />
                            <div style={{display: "flex", gap: "10px", marginTop: "10px"}}>
                              <button disabled={saving} onClick={saveEdit}>{saving ? "กำลังบันทึก..." : "บันทึกการแก้ไข"}</button>
                              <button className="secondary" disabled={saving} onClick={() => setEditState(null)}>ยกเลิก</button>
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
